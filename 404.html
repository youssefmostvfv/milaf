<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | ميلاف السعودية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--color-bg-main);
        }
        .error-container {
            padding: 40px;
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
        }
        h1 {
            font-size: 6rem;
            color: var(--color-accent-gold-solid);
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--color-text-muted);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>الصفحة غير موجودة</h2>
        <p>عذراً، الصفحة التي تبحث عنها قد تم نقلها أو حذفها.</p>
        <a href="/" class="btn-primary-small">العودة للرئيسية</a>
    </div>
</body>
</html>
