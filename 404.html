<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | ميلاف السعودية</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--color-bg-main);
        }
        .error-container {
            padding: 40px;
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
        }
        h1 {
            font-size: 6rem;
            color: var(--color-accent-gold-solid);
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--color-text-muted);
        }
    </style>
</head>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="/" style="text-decoration: none;">
                    <span class="logo-text">MILAF <span class="gold-text">SAUDI</span></span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="/">الرئيسية</a></li>
                <li><a href="/#about">الشركة</a></li>
                <li><a href="/#work-fields">مجالات العمل</a></li>
                <li><a href="Pages/Projects/index.html">المشروعات</a></li>
                <li><a href="Pages/certificates/index.html">الشهادات</a></li>
            </ul>
            <div class="nav-actions" style="display: flex; gap: 15px; align-items: center;">
                <a href="index-en.html" class="lang-switch"
                    style="font-weight: 500; display: flex; align-items: center; gap: 5px; opacity: 0.8; transition: all 0.3s;">
                    <span>English</span> <i class="ph ph-globe"></i>
                </a>
                <a href="/#contact" class="btn-primary-small">تواصل معنا</a>
            </div>
            <div class="menu-toggle" id="mobile-menu">
                <i class="ph ph-list"></i>
            </div>
        </div>
    </nav>

    <div class="error-container">
        <h1>404</h1>
        <h2>الصفحة غير موجودة</h2>
        <p>عذراً، الصفحة التي تبحث عنها قد تم نقلها أو حذفها.</p>
        <a href="/" class="btn-primary-small">العودة للرئيسية</a>
    </div>

    <script>
        // Navbar Scroll Effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.remove('transparent');
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile Menu Logic
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</html>
